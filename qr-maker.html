<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Custom QR Generator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h2>Dialysis Patient QR Generator</h2>

<p>Enter Patient Hospital ID to generate QR card</p>

<input

placeholder="Hospital ID (Example: 26051B)"
>

<button onclick="generateCustomQR()">
Generate QR

<div id="qrResult"></div>

</div>

<script src="script.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
