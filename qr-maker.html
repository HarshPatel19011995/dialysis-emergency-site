<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Custom QR Generator</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/png" href="images/favicon_big.png">
</head>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<body>

<div class="container">
  <div style="margin-bottom: 20px;">
    <button onclick="window.location.href='home.html'" style="background:var(--secondary);">Back</button>
  </div>

<h2>Dialysis Patient QR Generator</h2>

<p>Enter Patient Hospital ID to generate QR card</p>

<input 
id="qrHospitalId"
placeholder="Hospital ID (Example: ABC123)"
oninput="this.value = this.value.toUpperCase().replace(/\s/g, '')"
>

<button onclick="generateCustomQR()">
Generate QR
</button>

<div id="qrResult"></div>

</div>

<script src="lang.js"></script>
<script src="script.js"></script>


</body>

</html>
