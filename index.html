<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Dialysis Emergency Login</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HOSPITAL HEADER -->

<div class="top-header">

<div class="logo-area">
<img src="images/logo.png" alt="Hospital Logo">
</div>

<div class="title-area">
<h1>Shree Krishna Hospital</h1>
<p>Dialysis Emergency System</p>
</div>

</div>


<!-- LOGIN CONTAINER -->

<div class="container">

<h2>Patient Login</h2>

<p>Enter your Hospital ID to continue</p>

<input 
id="hospitalId" 
placeholder="Enter Hospital ID"
>

<button onclick="login()">
Login
</button>

<p id="message"></p>

</div>


<script src="script.js"></script>

</body>

</html>
